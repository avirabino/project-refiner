<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Target App - About</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>QA Target App</h1>
    <nav>
      <a href="index.html" data-testid="nav-home">Home</a>
      <a href="about.html" data-testid="nav-about">About</a>
      <a href="form.html" data-testid="nav-form">Form</a>
    </nav>
  </header>
  
  <main>
    <h2>About Page</h2>
    <p>This page exists primarily to test navigation recording in the extension.</p>
    <p>When you click the back link below, Refine should record a URL change event.</p>
    <br>

    <section>
      <h3>Feedback Form</h3>
      <form>
        <label for="input-name">Name</label>
        <input type="text" id="input-name" data-testid="input-name" placeholder="Your name" />
        <label for="input-email">Email</label>
        <input type="email" id="input-email" data-testid="input-email" placeholder="your@email.com" />
        <button type="submit" data-testid="btn-submit">Send</button>
      </form>
    </section>

    <a href="index.html" data-testid="nav-home">← Back to Home</a>
  </main>

  <script src="app.js"></script>
</body>
</html>
